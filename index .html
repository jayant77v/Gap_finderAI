<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GapFinder AI - Semantic Feature Gap Analysis</title>
  <style>
    :root {
      --bg: #09090b;
      --card-bg: #18181b;
      --border: #27272a;
      --text: #f4f4f5;
      --text-muted: #a1a1aa;
      --primary: #f3a04c;
      --primary-hover: #e58522;
      --success: #10b981;
      --destructive: #ef4444;
      --warning: #f59e0b;
    }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header {
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.025em;
    }
    main {
      flex: 1;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 32px 24px;
      box-sizing: border-box;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
    }
    @media (max-width: 768px) {
      main {
        grid-template-columns: 1fr;
      }
    }
    .input-section, .output-section {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
    }
    textarea, input {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 12px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus, input:focus {
      border-color: var(--primary);
    }
    button {
      background-color: var(--primary);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover {
      background-color: var(--primary-hover);
    }
    .result-card {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .mini-card {
      background-color: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }
    .gap-badge {
      display: inline-flex;
      background: rgba(243, 160, 76, 0.1);
      color: var(--primary);
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .badge-success { background: rgba(16, 185, 129, 0.1); color: var(--success); }
    .badge-destructive { background: rgba(239, 68, 68, 0.1); color: var(--destructive); }
  </style>
</head>
<body>
  <header>
    <h1>GapFinder AI // <span style="color: var(--text-muted); font-weight: 400;">Groq-Powered Semantic Analysis</span></h1>
    <div style="font-size: 12px; color: var(--text-muted);">Real-time LPU Inference</div>
  </header>

  <main>
    <div class="input-section">
      <div class="form-group">
        <label for="apiKey">Groq API Key</label>
        <input type="password" id="apiKey" placeholder="gsk_...">
      </div>
      <div class="form-group">
        <label for="prdText">Your Product Concept / PRD</label>
        <textarea id="prdText" rows="6" placeholder="Describe your product core value, key user flows, and roadmap features..."></textarea>
      </div>
      <div class="form-group">
        <label for="competitorText">Competitor Features & Market Capabilities</label>
        <textarea id="competitorText" rows="6" placeholder="List existing tools, their core strengths, and pricing options..."></textarea>
      </div>
      <button id="analyzeBtn">Analyze Semantic Gaps</button>
    </div>

    <div class="output-section">
      <div class="result-card" id="outputCard">
        <div style="text-align: center; color: var(--text-muted); padding: 40px 0;">
          Enter your data and run the analyzer to stream insights instantly.
        </div>
      </div>
    </div>
  </main>

  <script>
    document.getElementById('analyzeBtn').addEventListener('click', async () => {
      const apiKey = document.getElementById('apiKey').value;
      const prdText = document.getElementById('prdText').value;
      const competitorText = document.getElementById('competitorText').value;
      const outputCard = document.getElementById('outputCard');

      if (!apiKey || !prdText || !competitorText) {
        alert("Please fill in all fields (API Key, PRD, and Competitor Features)");
        return;
      }

      outputCard.innerHTML = `<div style="text-align: center; padding: 40px 0;">Analyzing gaps using Llama-3 via Groq LPU...</div>`;

      try {
        const response = await fetch('/.netlify/functions/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ apiKey, prdText, competitorText })
        });
        
        const data = await response.json();
        
        if (data.error) {
          outputCard.innerHTML = `<div style="color: var(--destructive); padding: 20px;">Error: ${data.error}</div>`;
          return;
        }

        let gapsHTML = '';
        data.semantic_gaps.forEach(gap => {
          gapsHTML += `
            <div class="mini-card" style="border-left: 3px solid var(--primary); margin-bottom: 12px;">
              <div class="gap-badge">Semantic Gap Opportunity</div>
              <h4 style="margin: 4px 0; font-size: 14px;">${gap.feature_suggestion}</h4>
              <p style="margin: 4px 0; font-size: 12px; color: var(--text-muted);"><strong>Pain Point:</strong> ${gap.user_pain_point}</p>
              <p style="margin: 4px 0; font-size: 12px; color: var(--text-muted);"><strong>Strategic Value:</strong> ${gap.strategic_value}</p>
            </div>
          `;
        });

        outputCard.innerHTML = `
          <h3 style="margin: 0; font-size: 16px;">Analysis Summary</h3>
          <p style="font-size: 13px; color: var(--text-muted); line-height: 1.5; margin: 0 0 16px 0;">${data.summary}</p>
          
          <div class="grid-2" style="margin-bottom: 16px;">
            <div class="mini-card">
              <div class="gap-badge badge-success">Our Key Advantages</div>
              <ul style="padding-left: 16px; margin: 8px 0 0 0; font-size: 12px; color: var(--text-muted);">
                ${data.our_advantages.map(item => `<li><strong>${item.name}</strong>: ${item.description}</li>`).join('')}
              </ul>
            </div>
            <div class="mini-card">
              <div class="gap-badge badge-destructive">Competitor Key Advantages</div>
              <ul style="padding-left: 16px; margin: 8px 0 0 0; font-size: 12px; color: var(--text-muted);">
                ${data.competitor_advantages.map(item => `<li><strong>${item.name}</strong>: ${item.description}</li>`).join('')}
              </ul>
            </div>
          </div>

          <h3 style="margin: 0 0 12px 0; font-size: 16px;">Strategic Recommendations</h3>
          ${gapsHTML}
        `;
      } catch (err) {
        outputCard.innerHTML = `<div style="color: var(--destructive); padding: 20px;">Network or Server Error occurred.</div>`;
      }
    });
  </script>
</body>
</html>
